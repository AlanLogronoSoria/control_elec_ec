name: control_electoral_ec
description: "Control Electoral Ecuador 2026 - Sistema de Escrutinio Electoral"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # ── Routing ───────────────────────────────────────────────────────────
  go_router: ^14.6.1

  # ── Dependency Injection ──────────────────────────────────────────────
  get_it: ^8.0.3

  # ── Backend ───────────────────────────────────────────────────────────
  appwrite: ^13.0.0

  # ── Local Database (Drift / SQLite) ───────────────────────────────────
  drift: ^2.20.3
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.25

  # ── Serialization / Immutability ──────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # ── Functional Programming ────────────────────────────────────────────
  dartz: ^0.10.1

  # ── Camera & Image ────────────────────────────────────────────────────
  image_picker: ^1.1.2
  image: ^4.3.0          # Pure-Dart image processing (Laplacian blur detection)

  # ── GPS ───────────────────────────────────────────────────────────────
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # ── Connectivity ──────────────────────────────────────────────────────
  connectivity_plus: ^6.1.4

  # ── Charts ────────────────────────────────────────────────────────────
  fl_chart: ^0.70.2

  # ── Storage & Security ────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

  # ── UI / UX ───────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3

  # ── Utilities ─────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  path: ^1.9.1
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
